<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Portal</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{--brand1:#5b6ef5;--brand2:#7c5cfa;}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f3f4fa;}
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  input:focus,textarea:focus,select:focus{outline:none;}
  ::-webkit-scrollbar{width:7px;height:7px;}
  ::-webkit-scrollbar-thumb{background:#c4c9de;border-radius:4px;}
  ::-webkit-scrollbar-track{background:transparent;}
  .save-toast{position:fixed;top:14px;right:14px;background:#166534;color:#fff;padding:9px 18px;border-radius:10px;font-size:12px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s,transform .3s;transform:translateY(-8px);pointer-events:none;box-shadow:0 6px 20px rgba(22,101,52,.3);}
  .save-toast.show{opacity:1;transform:translateY(0);}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  .fade-up{animation:fadeUp .35s ease;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}
  .pulse{animation:pulse 1.8s ease-in-out infinite;}
  /* Responsive helpers — phone-first */
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 16px;}
  .row-wrap{display:flex;gap:8;flex-wrap:wrap;}
  @media (max-width:680px){
    .grid2{grid-template-columns:1fr !important;gap:0 !important;}
    .pad-resp{padding:16px 14px !important;}
    .hide-mobile{display:none !important;}
    .stack-mobile{flex-direction:column !important;align-items:stretch !important;}
    .full-mobile{width:100% !important;}
    input,textarea,select{font-size:16px !important;} /* prevents iOS zoom-on-focus */
  }
  @media (max-width:420px){
    .pad-resp{padding:14px 12px !important;}
  }
</style>
</head>

<div id="root"></div>
<div id="save-toast" class="save-toast">✓ Progress saved</div>

<script type="text/babel">
window.storage={
  get:async function(key){var v=localStorage.getItem("cp_"+key);if(v===null)throw new Error("not found");return{key:key,value:v};},
  set:async function(key,value){localStorage.setItem("cp_"+key,value);return{key:key,value:value};},
  delete:async function(key){localStorage.removeItem("cp_"+key);return{key:key,deleted:true};},
  list:async function(prefix){var keys=[];for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k.startsWith("cp_"+(prefix||"")))keys.push(k.slice(3));}return{keys:keys};}
};

var useState=React.useState;var useEffect=React.useEffect;var useCallback=React.useCallback;var useRef=React.useRef;

var ADMIN={user:"admin"};
// SECURITY: No password is stored in this public code. On first run the admin
// sets their own password (kept only in this browser's local storage). The very
// first time, signing in as "admin" with any password you choose will set it.
async function getAdminPass(){try{var r=await window.storage.get("config:adminPass");return r&&r.value?r.value:null;}catch(ex){return null;}}
async function isAdminPassSet(){var p=await getAdminPass();return !!p;}

// Apply saved brand colors on startup
function applyTheme(c1,c2){try{var root=document.documentElement;if(c1)root.style.setProperty("--brand1",c1);if(c2)root.style.setProperty("--brand2",c2);}catch(ex){}}
(function(){try{var c1=localStorage.getItem("cp_config:brand1");var c2=localStorage.getItem("cp_config:brand2");applyTheme(c1,c2);}catch(ex){}})();

/* ── PDF ── */
function generatePDF(s){
  var jsPDF=window.jspdf.jsPDF;var doc=new jsPDF({unit:"mm",format:"a4"});var y=20;var lm=20;var pw=170;
  doc.setFillColor(30,35,55);doc.rect(0,0,210,40,"F");
  doc.setTextColor(255,255,255);doc.setFontSize(20);doc.setFont("helvetica","bold");doc.text("PROJECT BRIEF",lm,18);
  doc.setFontSize(11);doc.setFont("helvetica","normal");doc.text((s.clientName||s.username)+"  |  "+(s.project||""),lm,27);doc.text("Submitted: "+new Date(s.at).toLocaleString(),lm,34);
  y=50;doc.setTextColor(30,35,55);
  var data=s.data||{};
  Object.keys(data).forEach(function(sec){
    if(sec==="review")return;var fields=data[sec];var hasContent=false;
    Object.keys(fields).forEach(function(k){var v=fields[k];if(k==="files")return;if(k==="socialLinks"){if(v&&Object.keys(v).length)hasContent=true;return;}var dd=Array.isArray(v)?v.join(", "):String(v||"");if(dd)hasContent=true;});
    if(!hasContent)return;
    if(y>260){doc.addPage();y=20;}
    doc.setFillColor(91,110,245);doc.rect(lm,y,pw,8,"F");doc.setTextColor(255,255,255);doc.setFontSize(11);doc.setFont("helvetica","bold");doc.text(SEC_LABELS[sec]||sec,lm+4,y+5.5);y+=12;doc.setTextColor(30,35,55);
    Object.keys(fields).forEach(function(k){
      var v=fields[k];
      if(k==="files"){if(Array.isArray(v)&&v.length>0){if(y>270){doc.addPage();y=20;}doc.setFontSize(9);doc.setFont("helvetica","bold");doc.text("Uploaded Files:",lm,y);y+=5;doc.setFont("helvetica","normal");v.forEach(function(f){doc.text("  - "+f.name,lm,y);y+=4.5;});y+=2;}return;}
      if(k==="socialLinks"){if(v&&Object.keys(v).length){Object.keys(v).forEach(function(plat){if(!v[plat])return;if(y>270){doc.addPage();y=20;}doc.setFontSize(9);doc.setFont("helvetica","bold");doc.setTextColor(100,110,140);doc.text(plat,lm,y);doc.setFont("helvetica","normal");doc.setTextColor(30,35,55);doc.text(String(v[plat]),lm+45,y);y+=6;});}return;}
      var display=Array.isArray(v)?v.join(", "):String(v||"");if(!display)return;
      var label=k.replace(/([A-Z])/g," $1").replace(/^./,function(c){return c.toUpperCase();});
      if(y>270){doc.addPage();y=20;}
      doc.setFontSize(9);doc.setFont("helvetica","bold");doc.setTextColor(100,110,140);doc.text(label,lm,y);
      doc.setFont("helvetica","normal");doc.setTextColor(30,35,55);var lines=doc.splitTextToSize(display,pw-4);doc.text(lines,lm,y+4.5);y+=4.5+(lines.length*4.2)+3;
    });y+=4;
  });
  var pageCount=doc.internal.getNumberOfPages();for(var p=1;p<=pageCount;p++){doc.setPage(p);doc.setFontSize(8);doc.setTextColor(150,150,150);doc.text("Page "+p+" of "+pageCount,lm,290);}
  doc.save("brief-"+(s.username||"client")+".pdf");
}

/* helper to render a field value for display */
function renderFieldValue(k,v){
  if(k==="socialLinks"){
    if(!v||!Object.keys(v).length)return null;
    var entries=Object.keys(v).filter(function(p){return v[p];});
    if(!entries.length)return null;
    return entries.map(function(p){return p+": "+v[p];}).join("  |  ");
  }
  return Array.isArray(v)?v.join(", "):String(v||"");
}

          <div style={{background:"#fff",borderRadius:16,padding:24,border:"1px solid #e6e9f4"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18,flexWrap:"wrap",gap:10}}><h3 style={{margin:0,fontSize:20,color:"#1e2337"}}>Project Brief</h3><div style={{display:"flex",gap:6,flexWrap:"wrap"}}><Btn primary onClick={function(){generatePDF(viewSub);}} style={{fontSize:17}}>Download PDF</Btn><Btn onClick={function(){sendConfirmation(viewSub);}} style={{fontSize:17,background:"#16a34a",color:"#fff",border:"none"}}>Send Confirmation</Btn><Btn onClick={function(){emailClient(viewSub);}} style={{fontSize:17,background:"#0ea5e9",color:"#fff",border:"none"}}>Email Client</Btn><Btn onClick={function(){setShowRevision(!showRevision);}} style={{fontSize:17,background:"#f59e0b",color:"#fff",border:"none"}}>Request Changes</Btn></div></div>{showRevision?(<div style={{padding:18,background:"#fffbeb",borderRadius:12,border:"1px solid #fde68a",marginBottom:18}}><label style={{display:"block",fontSize:18,fontWeight:600,color:"#92400e",marginBottom:6}}>What needs to change?</label><textarea value={revNote} onChange={function(e){setRevNote(e.target.value);}} placeholder="Explain what the client should update..." rows={3} style={Object.assign({},IS,{borderColor:"#fde68a"})}/><div style={{display:"flex",gap:8,marginTop:10}}><Btn onClick={function(){sendBack(viewSub);}} style={{background:"#f59e0b",color:"#fff",border:"none",fontSize:17}}>Send Back to Client</Btn><Btn onClick={function(){setShowRevision(false);}} style={{fontSize:17}}>Cancel</Btn></div></div>):null}{viewSub.revisionNote?(<div style={{padding:14,background:"#fffbeb",borderRadius:10,border:"1px solid #fde68a",marginBottom:18,fontSize:17}}><strong style={{color:"#92400e"}}>Revision note sent:</strong><p style={{margin:"4px 0 0",color:"#78350f"}}>{viewSub.revisionNote}</p></div>):null}{["overview","contact","pages","features","design","technical","budget","final"].map(function(sec){var fields=(viewSub.data||{})[sec]||{};var hasContent=false;Object.keys(fields).forEach(function(k){var rv=renderFieldValue(k,fields[k]);if(k==="files"){if(Array.isArray(fields[k])&&fields[k].length>0)hasContent=true;}else if(rv)hasContent=true;});if(!hasContent)return null;return(<div key={sec} style={{marginBottom:20}}><h4 style={{fontSize:19,color:"#1e2337",margin:"0 0 10px",paddingBottom:7,borderBottom:"1px solid #f0f1f7"}}>{SEC_ICONS[sec]} {SEC_LABELS[sec]}</h4>{Object.keys(fields).map(function(k){var v=fields[k];if(k==="files"&&Array.isArray(v)&&v.length>0){return(<div key={k} style={{marginBottom:8}}><span style={{fontSize:16,color:"#7a82a6",fontWeight:600}}>Files</span>{v.map(function(f,i){return(<div key={i} style={{fontSize:17,color:"#1e2337",marginTop:3}}>{"\u{1F4CE} "+f.name}{f.data&&f.type&&f.type.startsWith("image")?<img src={f.data} alt="" style={{display:"block",maxWidth:170,marginTop:5,borderRadius:6}}/>:null}</div>);})}</div>);}var display=renderFieldValue(k,v);if(!display)return null;var label=k.replace(/([A-Z])/g," $1").replace(/^./,function(c){return c.toUpperCase();});return(<div key={k} style={{display:"flex",gap:8,marginBottom:6,fontSize:17,lineHeight:1.5}}><span style={{color:"#7a82a6",minWidth:160,fontWeight:500,flexShrink:0}}>{label}</span><span style={{color:"#1e2337"}}>{display}</span></div>);})}</div>);})}</div>
        </div>):null}
      </div>
    </div>
  );
}

/* ── CLIENT QUESTIONNAIRE ── */
function Questionnaire(props){
  var user=props.user;var onOut=props.onOut;var pType=user.project||"";
  var _step=useState(0);var step=_step[0];var setStep=_step[1];
  var _done=useState(false);var done=_done[0];var setDone=_done[1];
  var _busy=useState(false);var busy=_busy[0];var setBusy=_busy[1];
  var _status=useState("");var status=_status[0];var setStatus=_status[1];
  var _revNote=useState("");var revisionNote=_revNote[0];var setRevisionNote=_revNote[1];
  var _subData=useState(null);var subData=_subData[0];var setSubData=_subData[1];

  var emptyData={
    overview:{orgName:"",tagline:"",description:"",goals:"",targetAudience:"",projectType:pType},
    contact:{contactName:"",phone:"",whatsapp:"",email:"",altEmail:"",address:"",city:"",country:"",existingWebsite:"",socialPlatforms:[],socialLinks:{},bestContactTime:""},
    pages:{selectedPages:[],extraPages:"",contentReady:"",writeHelp:"",hasMedia:"",files:[]},
    features:{selected:[],otherFeatures:""},
    design:{style:"",colors:"",logo:"",exampleSites:"",mobileFirst:"",animations:"",files:[]},
    technical:{hasDomain:"",domainName:"",hasHosting:"",hostingProvider:"",contactEmail:"",otherEmails:""},
    budget:{range:"",payment:"",currency:"",customCurrency:"",deadline:"",priority:"",addons:[],ongoingUnderstood:"",hostingPlan:"",maintenancePlan:"",prepayPeriod:"",notes:""},
    final:{mustHave:"",dontWant:"",additionalNotes:"",referral:""}
  };
  var _d=useState(emptyData);var d=_d[0];var setD=_d[1];

  useEffect(function(){
    (async function(){
      try{var r=await window.storage.get("sub:"+user.username);if(r){var sub=JSON.parse(r.value);if(sub.status==="revision"){setStatus("revision");setRevisionNote(sub.revisionNote||"");setD(Object.assign({},emptyData,sub.data));return;}else{setSubData(sub);setDone(true);setStatus(sub.status||"submitted");return;}}}catch(ex){}
      try{var draft=await window.storage.get("draft:"+user.username);if(draft){var parsed=JSON.parse(draft.value);setD(Object.assign({},emptyData,parsed.data));if(parsed.step!==undefined)setStep(parsed.step);}}catch(ex){}
    })();
  },[user.username]);

  var saveDraft=function(newData,newStep){try{localStorage.setItem("cp_draft:"+user.username,JSON.stringify({data:newData||d,step:newStep!==undefined?newStep:step,savedAt:new Date().toISOString()}));showSaveToast();}catch(ex){}};
  var upd=function(sec,key,val){setD(function(p){var ns=Object.assign({},p[sec]);ns[key]=val;var nd=Object.assign({},p);nd[sec]=ns;saveDraft(nd);return nd;});};
  var updSocialLink=function(platform,val){setD(function(p){var ns=Object.assign({},p.contact);var links=Object.assign({},ns.socialLinks);links[platform]=val;ns.socialLinks=links;var nd=Object.assign({},p);nd.contact=ns;saveDraft(nd);return nd;});};
  var toggleSocialPlatform=function(platform){setD(function(p){var ns=Object.assign({},p.contact);var plats=ns.socialPlatforms||[];if(plats.includes(platform)){ns.socialPlatforms=plats.filter(function(x){return x!==platform;});}else{ns.socialPlatforms=plats.concat([platform]);}var nd=Object.assign({},p);nd.contact=ns;saveDraft(nd);return nd;});};
  var addFile=function(sec,f){setD(function(p){var ns=Object.assign({},p[sec]);ns.files=(ns.files||[]).concat([f]);var nd=Object.assign({},p);nd[sec]=ns;saveDraft(nd);return nd;});};
  var rmFile=function(sec,idx){setD(function(p){var ns=Object.assign({},p[sec]);ns.files=ns.files.filter(function(_,j){return j!==idx;});var nd=Object.assign({},p);nd[sec]=ns;saveDraft(nd);return nd;});};
  var goStep=function(i){setStep(i);saveDraft(d,i);};

  var submit=async function(){
    setBusy(true);
    try{var subStatus=status==="revision"?"resubmitted":"submitted";var existing=null;try{var er=await window.storage.get("sub:"+user.username);if(er)existing=JSON.parse(er.value);}catch(ex){}var sub={username:user.username,clientName:user.name,project:pType,at:new Date().toISOString(),data:d,status:subStatus,progressStage:existing?existing.progressStage||0:0,progressUpdates:existing?existing.progressUpdates||[]:[],seen:false};await window.storage.set("sub:"+user.username,JSON.stringify(sub));try{await window.storage.delete("draft:"+user.username);}catch(ex){}
      // Attempt email notification to admin if configured
      try{var nrec=await window.storage.get("config:notifyEmail");if(nrec&&nrec.value){var body="New project brief "+(subStatus==="resubmitted"?"(resubmitted) ":"")+"from "+(user.name||user.username)+" ("+pType+") submitted on "+new Date().toLocaleString()+". Log in to the admin dashboard to review it.";var mailto="mailto:"+encodeURIComponent(nrec.value)+"?subject="+encodeURIComponent("New brief: "+(user.name||user.username))+"&body="+encodeURIComponent(body);var win=window.open(mailto,"_blank");}}catch(ex){}
      setSubData(sub);setDone(true);setStatus(subStatus);}catch(ex){alert("Submission failed.");}
    setBusy(false);
  };

  if(done&&subData){return <BriefReadOnly sub={subData} user={user} onOut={onOut}/>;}

  var cur=STEPS[step];var pct=((step+1)/STEPS.length)*100;
  var pageOpts=COMMON_PAGES.concat(EXTRA_PAGES[pType]||[]);
  var featExtra=FEATURES_EXTRA[pType]||[];var featOpts=featExtra.concat(FEATURES_DEFAULT);
  var seen={};featOpts=featOpts.filter(function(x){if(seen[x])return false;seen[x]=true;return true;});

  var designOptions=[{v:"modern",l:"Modern & Clean",desc:"Minimal layout with bold fonts and plenty of whitespace."},{v:"classic",l:"Classic & Elegant",desc:"Traditional look with refined colors and serif fonts."},{v:"vibrant",l:"Vibrant & Playful",desc:"Bright colors and energetic feel. Great for schools or creative brands."},{v:"corporate",l:"Professional & Formal",desc:"Structured, business-like. Ideal for corporate sites or colleges."}];

  var renderReview=function(){
    var sections=["overview","contact","pages","features","design","technical","budget","final"];
    return(<div>
      {revisionNote?(<div style={{padding:16,background:"#fef3c7",borderRadius:12,border:"1px solid #fde68a",marginBottom:20}}><p style={{margin:0,fontSize:18,fontWeight:600,color:"#92400e"}}>Your project manager requested these changes:</p><p style={{margin:"6px 0 0",fontSize:18,color:"#78350f",lineHeight:1.5}}>{revisionNote}</p></div>):null}
      <div style={{padding:16,background:"#eff6ff",borderRadius:12,border:"1px solid #bfdbfe",marginBottom:20}}><p style={{margin:0,fontSize:18,color:"#1e40af",lineHeight:1.6}}>Review your answers below. Click <strong>Edit</strong> to fix anything. When ready, click <strong>Confirm & Submit</strong>.</p></div>
      {sections.map(function(sec){var fields=d[sec]||{};var hasContent=false;Object.keys(fields).forEach(function(k){var rv=renderFieldValue(k,fields[k]);if(k==="files"){if(Array.isArray(fields[k])&&fields[k].length>0)hasContent=true;}else if(rv)hasContent=true;});return(<div key={sec} style={{marginBottom:14,padding:0,background:secTheme(sec).bg,borderRadius:12,border:"1px solid "+secTheme(sec).border,overflow:"hidden",boxShadow:"0 4px 14px "+secTheme(sec).shadow}}><div style={{height:4,background:secTheme(sec).bar}}></div><div style={{padding:16}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:hasContent?10:0}}><h3 style={{margin:0,fontSize:19,color:secTheme(sec).accent,fontWeight:700}}>{SEC_ICONS[sec]} {SEC_LABELS[sec]}</h3><button onClick={function(){var idx=sections.indexOf(sec);goStep(idx);}} style={{background:secTheme(sec).bar,border:"none",color:"#fff",cursor:"pointer",fontSize:14,fontWeight:600,padding:"4px 12px",borderRadius:7}}>Edit</button></div>{!hasContent?<p style={{margin:"6px 0 0",fontSize:17,color:"#a0a6c4",fontStyle:"italic"}}>No answers yet — click Edit</p>:null}{Object.keys(fields).map(function(k){var v=fields[k];if(k==="files"&&Array.isArray(v)&&v.length>0){return(<div key={k} style={{marginBottom:4}}>{v.map(function(f,i){return <div key={i} style={{fontSize:16,color:"#1e2337"}}>{"\u{1F4CE} "+f.name}</div>;})}</div>);}var display=renderFieldValue(k,v);if(!display)return null;var label=k.replace(/([A-Z])/g," $1").replace(/^./,function(c){return c.toUpperCase();});return(<div key={k} style={{display:"flex",gap:6,marginBottom:4,fontSize:17}}><span style={{color:secTheme(sec).accent,minWidth:140,fontWeight:600,opacity:.75}}>{label}:</span><span style={{color:"#1e2337"}}>{display}</span></div>);})}</div></div>);})}
    </div>);
  };

  return(
    <div style={{minHeight:"100vh",background:"#f3f4fa",fontFamily:"Inter,-apple-system,sans-serif"}}>
      <header style={{background:"#fff",borderBottom:"1px solid #e6e9f4",height:56,padding:"0 18px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:10}}><div style={{display:"flex",alignItems:"center",gap:9}}><LogoMark size={30} radius={8}/><div><div style={{fontWeight:700,fontSize:18.5,color:"#1e2337",lineHeight:1.2}}>Project Brief</div><div style={{fontSize:15,color:"#7a82a6"}}>Hi, {user.name||user.username}</div></div></div><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:15,color:"#16a34a",background:"#f0fdf4",padding:"3px 10px",borderRadius:7,fontWeight:500}}>Auto-saving</span><Btn onClick={onOut} style={{fontSize:15.5,padding:"5px 12px"}}>Sign Out</Btn></div></header>

      <div style={{background:"linear-gradient(90deg,#eff6ff,#eef0ff)",padding:"10px 18px",borderBottom:"1px solid #dbeafe",fontSize:17,color:"#3b82f6",display:"flex",alignItems:"center",gap:8}}><span>{"\u{1F4BE}"}</span><span>Your progress is saved automatically. Take a break anytime — just log back in to continue.</span></div>
      {status==="revision"?(<div style={{background:"#fef3c7",padding:"10px 18px",borderBottom:"1px solid #fde68a",fontSize:17,color:"#92400e",display:"flex",alignItems:"center",gap:8}}><span>{"\u{1F4DD}"}</span><span><strong>Changes requested:</strong> Please update your answers and resubmit. Details are on the Review step.</span></div>):null}

      <div style={{background:"#fff",padding:"12px 18px 16px",borderBottom:"1px solid #e6e9f4"}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{fontSize:16,fontWeight:600,color:"var(--brand1)"}}>Step {step+1} of {STEPS.length}</span><span style={{fontSize:16,color:"#7a82a6"}}>{Math.round(pct)}%</span></div><div style={{height:5,background:"#e6e9f4",borderRadius:3}}><div style={{height:"100%",width:pct+"%",borderRadius:3,background:"linear-gradient(90deg,var(--brand1),var(--brand2))",transition:"width .35s"}}></div></div><div style={{display:"flex",gap:4,marginTop:10,overflowX:"auto",paddingBottom:2}}>{STEPS.map(function(s,i){return(<button key={s.id} onClick={function(){goStep(i);}} style={{padding:"5px 10px",borderRadius:7,fontSize:15,fontWeight:600,border:"none",cursor:"pointer",whiteSpace:"nowrap",flexShrink:0,background:i===step?"var(--brand1)":i<step?"#dfe3ff":"#f0f1f7",color:i===step?"#fff":i<step?"var(--brand1)":"#a0a6c4"}}>{s.icon} {s.label}</button>);})}</div></div>

      <div style={{maxWidth:640,margin:"0 auto",padding:"20px 16px 110px"}} className="fade-up">
        <div style={{background:"#fff",borderRadius:16,border:"1px solid "+secTheme(cur.id).border,boxShadow:"0 6px 24px "+secTheme(cur.id).shadow,overflow:"hidden"}}>
          <div style={{height:6,background:secTheme(cur.id).bar}}></div>
          <div style={{background:secTheme(cur.id).bg,padding:"18px 22px",borderBottom:"1px solid "+secTheme(cur.id).border}}>
            <h2 style={{margin:0,fontSize:24,color:secTheme(cur.id).accent,fontWeight:800}}>{cur.icon} {cur.label}</h2>
          </div>
          <div style={{padding:"22px"}}>
          {cur.id==="overview"?(<div>
            <p style={{fontSize:18,color:"#7a82a6",margin:"0 0 20px",lineHeight:1.6}}>Let's get to know your organization. This helps us understand who you are and what your website should communicate.</p>
            <TInput label="What is your organization or business name?" required hint="This appears on your website header, footer, and browser tab. Type the exact spelling you want." value={d.overview.orgName} onChange={function(e){upd("overview","orgName",e.target.value);}} placeholder="e.g. Sunrise International Academy"/>
            <TInput label="Do you have a tagline or slogan?" hint="A short, memorable phrase. Leave blank if you don't have one." value={d.overview.tagline} onChange={function(e){upd("overview","tagline",e.target.value);}} placeholder="e.g. Building Tomorrow's Leaders"/>
            <TArea label="Tell us about your organization" required hint="Describe what you do, who you serve, and what makes you unique. Just tell us like you'd tell a friend." value={d.overview.description} onChange={function(e){upd("overview","description",e.target.value);}} placeholder="e.g. We are a private secondary school in Kigali offering Cambridge curriculum..." rows={4}/>
            <TArea label="What should this website do for you?" hint="What do you want visitors to do? List your top goals." value={d.overview.goals} onChange={function(e){upd("overview","goals",e.target.value);}} placeholder="e.g. 1. Parents can apply online\n2. Showcase our programs\n3. Share news"/>
            <TInput label="Who will visit your website most?" hint="List the main groups of people who will use your site." value={d.overview.targetAudience} onChange={function(e){upd("overview","targetAudience",e.target.value);}} placeholder="e.g. Parents of prospective students"/>
          </div>):null}

          {cur.id==="contact"?(<div>
            <p style={{fontSize:18,color:"#7a82a6",margin:"0 0 20px",lineHeight:1.6}}>We need your contact details so we can reach you throughout the project, and your existing links so we can connect everything correctly. The more accurate this is, the smoother things go.</p>
            <TInput label="Main contact person" required hint="The person we should communicate with about this project." value={d.contact.contactName} onChange={function(e){upd("contact","contactName",e.target.value);}} placeholder="e.g. John Doe, Marketing Manager"/>
            <TInput label="Phone number" required type="tel" hint="A number we can call or text. Include your country code." value={d.contact.phone} onChange={function(e){upd("contact","phone",e.target.value);}} placeholder="e.g. +250 7XX XXX XXX"/>
            <TInput label="WhatsApp number" hint="If different from your phone number, or leave blank if it's the same. WhatsApp is often the fastest way to reach you." value={d.contact.whatsapp} onChange={function(e){upd("contact","whatsapp",e.target.value);}} placeholder="e.g. +250 7XX XXX XXX"/>
            <TInput label="Email address" required type="email" hint="Your main email for project communication, contracts, and invoices." value={d.contact.email} onChange={function(e){upd("contact","email",e.target.value);}} placeholder="e.g. you@example.com"/>
            <TInput label="Alternative email" hint="A backup email in case the main one has issues (optional)." value={d.contact.altEmail} onChange={function(e){upd("contact","altEmail",e.target.value);}} placeholder="e.g. backup@example.com"/>
            <TInput label="Physical address" hint="Your business or organization address. This may appear on your website's contact page and Google Maps." value={d.contact.address} onChange={function(e){upd("contact","address",e.target.value);}} placeholder="e.g. KG 123 St, Kimihurura"/>
            <div className="grid2">
              <TInput label="City" value={d.contact.city} onChange={function(e){upd("contact","city",e.target.value);}} placeholder="e.g. Kigali"/>
              <TInput label="Country" value={d.contact.country} onChange={function(e){upd("contact","country",e.target.value);}} placeholder="e.g. Rwanda"/>
            </div>
            <TInput label="Do you have an existing website?" hint="If you currently have a website (even an old one), paste the link. It helps us understand what you have now. Leave blank if this is your first." value={d.contact.existingWebsite} onChange={function(e){upd("contact","existingWebsite",e.target.value);}} placeholder="e.g. https://www.oldsite.com"/>

            {/* Social media with links */}
            <div style={{marginBottom:22}}>
              <label style={{display:"block",fontSize:18,fontWeight:600,color:"#1e2337",marginBottom:5}}>Your social media accounts</label>
              <p style={{fontSize:16,color:"#7a82a6",margin:"0 0 9px",lineHeight:1.5}}>Tap each platform where you have an account. A box will appear for you to paste the link or number — this is what we'll connect your website to.</p>
              <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:12}}>
                {SOCIAL_PLATFORMS.map(function(plat){var on=(d.contact.socialPlatforms||[]).includes(plat);return(<button type="button" key={plat} onClick={function(){toggleSocialPlatform(plat);}} style={{padding:"8px 15px",borderRadius:9,fontSize:17,fontWeight:500,cursor:"pointer",border:on?"2px solid var(--brand1)":"1.5px solid #dfe3f0",background:on?"#eef0ff":"#fff",color:on?"var(--brand1)":"#1e2337",transition:"all .12s"}}>{on?"\u2713 ":""}{plat}</button>);})}
              </div>
              {(d.contact.socialPlatforms||[]).map(function(plat){return(<div key={plat} style={{marginBottom:10}}><label style={{display:"block",fontSize:16,fontWeight:600,color:"var(--brand1)",marginBottom:4}}>{plat} link / number</label><input value={(d.contact.socialLinks||{})[plat]||""} onChange={function(e){updSocialLink(plat,e.target.value);}} placeholder={SOCIAL_PLACEHOLDERS[plat]} style={IS} onFocus={function(e){e.target.style.borderColor="var(--brand1)";}} onBlur={function(e){e.target.style.borderColor="#dfe3f0";}}/></div>);})}
            </div>

            <Radio label="Best time to reach you" hint="When are you usually available for a call or message?" options={["Morning","Afternoon","Evening","Anytime"]} value={d.contact.bestContactTime} onChange={function(v){upd("contact","bestContactTime",v);}}/>
          </div>):null}

          {cur.id==="pages"?(<div>
            <p style={{fontSize:18,color:"#7a82a6",margin:"0 0 20px",lineHeight:1.6}}>A website is made of different pages, like chapters in a book. Select the ones you need — if unsure, pick the basics and we'll advise.</p>
            <Chips label="Which pages do you want?" hint="Tap to select each page. You can add or remove pages later during design." options={pageOpts} value={d.pages.selectedPages} onChange={function(v){upd("pages","selectedPages",v);}}/>
            <TInput label="Any other pages not listed?" hint="Type custom pages, separated by commas." value={d.pages.extraPages} onChange={function(e){upd("pages","extraPages",e.target.value);}} placeholder="e.g. Alumni, Careers"/>
            <Radio label="Do you have text content ready?" required hint="Content means the words and information on each page. If you don't have it, we can help write it." options={["Yes, all ready","Some pages ready","No, I need help"]} value={d.pages.contentReady} onChange={function(v){upd("pages","contentReady",v);}}/>
            {(d.pages.contentReady==="No, I need help"||d.pages.contentReady==="Some pages ready")?(<Radio label="Want us to write the content?" hint="Send us rough notes and we'll polish it into website text." options={["Yes, write it for me","I'll send rough notes to polish","I'll write it myself"]} value={d.pages.writeHelp} onChange={function(v){upd("pages","writeHelp",v);}}/>):null}
            <Radio label="Do you have photos and videos ready?" hint="Good photos make a huge difference. We can guide you if needed." options={["Yes, all ready","I have some","No, I need guidance"]} value={d.pages.hasMedia} onChange={function(v){upd("pages","hasMedia",v);}}/>
            <Uploader label="Upload any files you have" hint="Logo, photos, brochures, documents — anything that helps us understand your brand." files={d.pages.files} onAdd={function(f){addFile("pages",f);}} onRemove={function(i){rmFile("pages",i);}}/>
          </div>):null}

          {cur.id==="features"?(<div>
            <p style={{fontSize:18,color:"#7a82a6",margin:"0 0 20px",lineHeight:1.6}}>Features are interactive things your website can do beyond showing information. Select everything you think you'll need.</p>
            <Chips label="What should your website be able to do?" hint="Tap each feature you want. If unsure what something means, select it and we'll explain during our review call." options={featOpts} value={d.features.selected} onChange={function(v){upd("features","selected",v);}}/>
            <TArea label="Any other features or integrations?" hint="Anything else? E.g. booking system, payment gateway, student portal, membership area." value={d.features.otherFeatures} onChange={function(e){upd("features","otherFeatures",e.target.value);}} placeholder="e.g. I need a booking system and integration with our student database"/>
          </div>):null}

          {cur.id==="design"?(<div>
            <p style={{fontSize:18,color:"#7a82a6",margin:"0 0 20px",lineHeight:1.6}}>This helps us understand the visual style you want. No wrong answers — pick what feels right, and you can request changes before we finalize.</p>
            <div style={{marginBottom:22}}><label style={{display:"block",fontSize:18,fontWeight:600,color:"#1e2337",marginBottom:4}}>What design style do you prefer?</label><p style={{fontSize:16,color:"#7a82a6",margin:"0 0 10px",lineHeight:1.5}}>Pick the style that best matches the image you want to project.</p><div className="grid2" style={{gap:9}}>{designOptions.map(function(s){return(<div key={s.v} onClick={function(){upd("design","style",s.v);}} style={{padding:14,borderRadius:11,cursor:"pointer",border:d.design.style===s.v?"2px solid var(--brand1)":"1.5px solid #dfe3f0",background:d.design.style===s.v?"#f0f2ff":"#fff",transition:"all .12s"}}><div style={{fontWeight:600,fontSize:18,color:"#1e2337",marginBottom:3}}>{s.l}</div><div style={{fontSize:15.5,color:"#7a82a6",lineHeight:1.4}}>{s.desc}</div></div>);})}</div></div>
            <TInput label="What are your brand colors?" hint="Colors representing your organization. Describe in words or paste color codes." value={d.design.colors} onChange={function(e){upd("design","colors",e.target.value);}} placeholder="e.g. Navy blue and gold, or #003366"/>
            <Radio label="Do you have a logo?" hint="Upload it below if you have one, or we can design one for you." options={["Yes, I have one","No, I need one designed","I have a rough idea"]} value={d.design.logo} onChange={function(v){upd("design","logo",v);}}/>
            <TArea label="Share 1-3 websites you like" hint="Find websites whose look you admire and paste their addresses. Very helpful for us." value={d.design.exampleSites} onChange={function(e){upd("design","exampleSites",e.target.value);}} placeholder="https://example.com — I like how clean it looks"/>
            <Radio label="How important is the mobile experience?" hint="Over 70% of people browse on phones. 'Mobile first' is recommended." options={["Mobile first (recommended)","Equal priority","Desktop is more important"]} value={d.design.mobileFirst} onChange={function(v){upd("design","mobileFirst",v);}}/>
            <Radio label="Do you want animations?" hint="Smooth visual effects when scrolling. Modern but can slow things if overdone." options={["Yes, modern animations","Subtle and minimal","No animations"]} value={d.design.animations} onChange={function(v){upd("design","animations",v);}}/>
            <Uploader label="Upload your logo or brand materials" hint="Logo (PNG with transparent background is best) or brand guidelines." files={d.design.files} onAdd={function(f){addFile("design",f);}} onRemove={function(i){rmFile("design",i);}}/>
          </div>):null}

          {cur.id==="technical"?(<div>
            <p style={{fontSize:18,color:"#7a82a6",margin:"0 0 20px",lineHeight:1.6}}>Don't worry if these feel technical — just answer what you know and we'll handle the rest.</p>
            <Radio label="Do you own a domain name (web address)?" required hint="The address people type to visit your site, like 'yourschool.com'." options={["Yes, I have one","No, I need to get one","Not sure"]} value={d.technical.hasDomain} onChange={function(v){upd("technical","hasDomain",v);}}/>
            {d.technical.hasDomain==="Yes, I have one"?<TInput label="What is your domain name?" hint="Type it exactly as purchased." value={d.technical.domainName} onChange={function(e){upd("technical","domainName",e.target.value);}} placeholder="e.g. myschool.com"/>:null}
            <Radio label="Do you have web hosting?" hint="Hosting is like renting space online for your site files. First website? We can set it up." options={["Yes, I have hosting","No, I need it set up","Not sure"]} value={d.technical.hasHosting} onChange={function(v){upd("technical","hasHosting",v);}}/>
            {d.technical.hasHosting==="Yes, I have hosting"?<TInput label="Who manages your hosting?" hint="The name of the company or service that keeps your current website online, if you know it. Leave blank if you're not sure." value={d.technical.hostingProvider} onChange={function(e){upd("technical","hostingProvider",e.target.value);}} placeholder="Type the name if you know it"/>:null}
            <TInput label="Where should website form messages be sent?" required hint="When someone fills a contact form, the message goes to this email." value={d.technical.contactEmail} onChange={function(e){upd("technical","contactEmail",e.target.value);}} placeholder="e.g. info@yourschool.com"/>
            <TInput label="Any additional recipients for form messages?" hint="Other people who should receive form submissions, separated by commas." value={d.technical.otherEmails} onChange={function(e){upd("technical","otherEmails",e.target.value);}} placeholder="e.g. principal@school.com"/>
          </div>):null}

          {cur.id==="budget"?(<div>
            <p style={{fontSize:18,color:"#7a82a6",margin:"0 0 18px",lineHeight:1.6}}>This helps us recommend the right package. All prices are estimates — your final quote depends on the type of website you chose and the features you selected, so a simple site costs less than one with many advanced features. We'll confirm everything before any work begins.</p>

            <div style={{padding:"16px 18px",background:"linear-gradient(135deg,#fff7ed,#fffbeb)",border:"1px solid #fed7aa",borderRadius:12,marginBottom:24}}>
              <p style={{margin:"0 0 8px",fontSize:18.5,fontWeight:700,color:"#9a3412",display:"flex",alignItems:"center",gap:6}}>{"\u26A0\uFE0F"} Please read: ongoing (recurring) costs</p>
              <p style={{margin:"0 0 8px",fontSize:17,color:"#7c2d12",lineHeight:1.6}}>Building a website is a one-time cost. But to keep it <strong>live and working</strong>, a few things must be renewed regularly. These are normal for every website and are separate from the design/build fee:</p>
              <ul style={{margin:"0 0 8px",paddingLeft:18,fontSize:17,color:"#7c2d12",lineHeight:1.7}}>
                <li><strong>Domain name</strong> (your web address) — renewed periodically (monthly or yearly). If it expires and isn't renewed, your website address stops working.</li>
                <li><strong>Hosting</strong> (the space that keeps your site online) — paid on an ongoing basis (monthly or yearly). If hosting isn't paid, your website goes offline.</li>
                <li><strong>Business email</strong> (e.g. you@yourname.com) — if you want custom email, it's a recurring monthly cost per mailbox.</li>
                <li><strong>Maintenance</strong> (optional) — keeping your site updated, secure, and backed up. You can handle this yourself or pay us monthly to manage it.</li>
              </ul>
              <p style={{margin:0,fontSize:17,color:"#7c2d12",lineHeight:1.6}}>We explain all of this clearly so there are no surprises later. You can also <strong>pre-pay for several months or a full year at once</strong> if you prefer not to track monthly renewals.</p>
            </div>

            <Radio label="Do you understand the ongoing costs above?" required hint="We want to be transparent so there are no problems later. Please confirm you've read the recurring-cost note." options={["Yes, I understand","I have questions — let's discuss"]} value={d.budget.ongoingUnderstood} onChange={function(v){upd("budget","ongoingUnderstood",v);}}/>

            <Radio label="What is your budget range for the build?" required hint="This is for designing and building the website (one-time). Your final quote depends on your chosen website type and features." options={[{value:"basic",label:"$300 - $700 (Basic)"},{value:"standard",label:"$700 - $1,500 (Standard)"},{value:"premium",label:"$1,500 - $3,000 (Premium)"},{value:"enterprise",label:"$3,000+ (Enterprise)"},{value:"discuss",label:"Let's discuss"}]} value={d.budget.range} onChange={function(v){upd("budget","range",v);}}/>

            <Radio label="How would you like to pay for the build?" hint="With 50/50, you pay half to start and half on delivery. We're flexible." options={[{value:"5050",label:"50% upfront, 50% on delivery"},{value:"3parts",label:"3 installments"},{value:"full",label:"Full payment upfront"},{value:"discuss",label:"Let's discuss"}]} value={d.budget.payment} onChange={function(v){upd("budget","payment",v);}}/>

            <Radio label="Preferred currency" hint="Choose the currency you'd like to be quoted and pay in. If yours isn't listed, pick 'Other' and type it below." options={["USD ($)","EUR (\u20AC)","GBP (\u00A3)","AUD (A$)","RWF (FRw)","UGX (USh)","KES (KSh)","Other"]} value={d.budget.currency} onChange={function(v){upd("budget","currency",v);}}/>
            {d.budget.currency==="Other"?(<TInput label="Which currency?" required hint="Type the currency you'd like to use." value={d.budget.customCurrency} onChange={function(e){upd("budget","customCurrency",e.target.value);}} placeholder="e.g. CAD, ZAR, NGN, TZS"/>):null}

            <Radio label="How would you like to handle hosting & renewals?" hint="To keep your website online, hosting must be paid on an ongoing basis. You can change this later." options={["Pay monthly","Pre-pay for the year (often cheaper)","I'll arrange hosting myself","Not sure - please advise"]} value={d.budget.hostingPlan} onChange={function(v){upd("budget","hostingPlan",v);}}/>

            <Radio label="Would you like us to maintain your website?" hint="Maintenance means we keep your site updated, secure, backed up, and fix issues. It's optional and billed monthly. Without it, you'd handle updates yourself." options={["Yes, monthly maintenance","No, I'll manage it myself","Tell me more first"]} value={d.budget.maintenancePlan} onChange={function(v){upd("budget","maintenancePlan",v);}}/>

            <Radio label="For recurring costs, would you prefer to pre-pay?" hint="Paying several months or a full year upfront means fewer renewals to track and often a better rate. Optional." options={["Monthly","3 months upfront","6 months upfront","1 year upfront","Let's discuss"]} value={d.budget.prepayPeriod} onChange={function(v){upd("budget","prepayPeriod",v);}}/>

            <TInput label="When do you want it ready?" type="date" hint="Pick your ideal launch date. The actual timeline depends on the website type and features you chose, and how quickly you provide content. If you have a hard deadline, tell us." value={d.budget.deadline} onChange={function(e){upd("budget","deadline",e.target.value);}}/>

            <div style={{padding:"15px 18px",background:"linear-gradient(135deg,#eef2ff,#f5f3ff)",border:"1px solid #c7d2fe",borderRadius:12,marginBottom:18}}>
              <p style={{margin:"0 0 6px",fontSize:18,fontWeight:700,color:"#3730a3",display:"flex",alignItems:"center",gap:6}}>{"\u26A1"} About speed & priority</p>
              <p style={{margin:0,fontSize:17,color:"#4338ca",lineHeight:1.6}}>If you need your website <strong>faster than normal</strong>, we can prioritise your project ahead of others — but rush/priority work usually costs more, since it takes extra focus and time. Once we see your request, we'll review our current schedule and <strong>propose a realistic delivery date</strong> based on the priority level you choose. We'll always be honest about what's achievable.</p>
            </div>
            <Radio label="How urgent is this project?" hint="This tells us how to plan. Higher priority may cost more but moves you to the front of the line. We'll confirm the timeline and any rush fee before starting." options={[{value:"flexible",label:"No rush — flexible timing"},{value:"normal",label:"Normal — standard timeline"},{value:"priority",label:"Priority — I need it sooner (may cost more)"},{value:"urgent",label:"Urgent — top priority ASAP (rush fee applies)"}]} value={d.budget.priority} onChange={function(v){upd("budget","priority",v);}}/>

            <Chips label="Any additional services?" hint="Optional extras. We'll include pricing in your quote." options={["SEO Optimization","Content Writing","Logo Design","Social Media Setup","Custom Business Email","Training & Handover","Monthly Maintenance","Analytics Setup"]} value={d.budget.addons} onChange={function(v){upd("budget","addons",v);}}/>

            <TArea label="Any notes about budget, payment, or timeline?" hint="Anything else? E.g. 'We need it live before January enrollment' or 'We'd like to pre-pay hosting for 2 years'." value={d.budget.notes} onChange={function(e){upd("budget","notes",e.target.value);}}/>
          </div>):null}

          {cur.id==="final"?(<div>
            <p style={{fontSize:18,color:"#7a82a6",margin:"0 0 20px",lineHeight:1.6}}>Almost done! These final questions help us understand your priorities and avoid misunderstandings.</p>
            <TArea label="Top 3 things your website MUST have?" required hint="Your highest priorities. Be specific." value={d.final.mustHave} onChange={function(e){upd("final","mustHave",e.target.value);}} placeholder="1. Online application form\n2. Photo gallery by events\n3. Mobile-friendly design" rows={4}/>
            <TArea label="What do you NOT want?" hint="Common dislikes: pop-ups, auto-playing music, clutter, tiny text, slow loading." value={d.final.dontWant} onChange={function(e){upd("final","dontWant",e.target.value);}} placeholder="e.g. No auto-playing music, no clutter"/>
            <TArea label="Anything else we should know?" hint="Your open space for any requests, concerns, or ideas." value={d.final.additionalNotes} onChange={function(e){upd("final","additionalNotes",e.target.value);}}/>
            <Radio label="How did you hear about us?" options={["Google Search","Social Media","Friend / Colleague","Returning Client","Other"]} value={d.final.referral} onChange={function(v){upd("final","referral",v);}}/>
          </div>):null}

          {cur.id==="review"?renderReview():null}
          </div>
        </div>
      </div>

      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#fff",borderTop:"1px solid #e6e9f4",padding:"12px 18px",display:"flex",justifyContent:"space-between",zIndex:10}}><Btn disabled={step===0} onClick={function(){goStep(step-1);}}>Previous</Btn>{step<STEPS.length-1?(<Btn primary onClick={function(){goStep(step+1);}}>{step===STEPS.length-2?"Review My Answers":"Next Step"}</Btn>):(<button disabled={busy} onClick={submit} style={{padding:"10px 26px",background:busy?"#86efac":"linear-gradient(135deg,#22c55e,#16a34a)",color:"#fff",border:"none",borderRadius:10,fontSize:18.5,fontWeight:600,cursor:busy?"wait":"pointer",boxShadow:"0 4px 12px rgba(34,197,94,.28)"}}>{busy?"Submitting...":(status==="revision"?"Resubmit Updated Brief":"Confirm & Submit")}</button>)}</div>
    </div>
  );
}

function App(){
  var _user=useState(null);var user=_user[0];var setUser=_user[1];
  if(!user)return <Login onAuth={setUser}/>;
  if(user.role==="admin")return <Admin onOut={function(){setUser(null);}}/>;
  return <Questionnaire user={user} onOut={function(){setUser(null);}}/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
